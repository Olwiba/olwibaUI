name: Publish Package

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@olwiba'

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Resolve package metadata
        run: |
          echo "PKG_NAME=$(node -p "require('./package.json').name")" >> "$GITHUB_ENV"
          echo "PKG_VERSION=$(node -p "require('./package.json').version")" >> "$GITHUB_ENV"

      - name: Pack
        run: |
          mkdir -p artifacts
          npm pack --pack-destination artifacts

      - name: Publish to GitHub Packages (if needed)
        run: |
          if npm view "${PKG_NAME}@${PKG_VERSION}" --registry=https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "Package ${PKG_NAME}@${PKG_VERSION} already exists. Skipping publish."
          else
            npm publish
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: artifacts/*.tgz
